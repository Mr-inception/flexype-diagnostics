<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FlexyPe Store Diagnostics</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="header">
    <div class="brand">
      <span class="brand-dot"></span>
      <h1>FlexyPe Diagnostics</h1>
    </div>
    <button id="rescanBtn" class="icon-btn" title="Re-scan this page">⟳</button>
  </header>

  <div id="notShopifyBanner" class="banner hidden">
    ⚠️ This page does not look like a Shopify storefront (or the page hasn't finished loading). Results may be incomplete.
  </div>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="store">Store Info</button>
    <button class="tab-btn" data-tab="products">FlexyPe Products</button>
    <button class="tab-btn" data-tab="disabled">Disabled</button>
    <button class="tab-btn" data-tab="apps">3rd-Party Apps</button>
    <button class="tab-btn" data-tab="config">Config (Bonus)</button>
  </nav>

  <main id="content" class="content">
    <!-- STORE INFO -->
    <section id="tab-store" class="tab-panel active">
      <table class="info-table" id="storeInfoTable"></table>
    </section>

    <!-- FLEXYPE PRODUCTS -->
    <section id="tab-products" class="tab-panel">
      <div id="productsList" class="card-list"></div>
    </section>

    <!-- DISABLED / COMMENTED INTEGRATIONS -->
    <section id="tab-disabled" class="tab-panel">
      <div id="disabledList" class="card-list"></div>
    </section>

    <!-- THIRD PARTY APPS -->
    <section id="tab-apps" class="tab-panel">
      <div id="appsList" class="chip-list"></div>
    </section>

    <!-- BONUS CONFIG -->
    <section id="tab-config" class="tab-panel">
      <p class="hint">Fetch backend configuration for a detected FlexyPe product (requires FlexyPe API access).</p>
      <div id="configButtons" class="card-list"></div>
      <pre id="configOutput" class="config-output hidden"></pre>
    </section>
  </main>

  <footer class="footer">
    <span id="statusText">Scanning…</span>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
